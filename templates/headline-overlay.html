<!doctype html>
<html lang="ja">
<head><meta charset="utf-8">{{STYLE}}
<style>
  /* Large device; headline floats over the top with a soft scrim. */
  .stage { justify-content: flex-end; }
  .device { width: var(--device-width, 360px); margin-bottom: -90px; }
  .overlay {
    position: absolute;
    top: 88px; left: 0; right: 0;
    display: flex; flex-direction: column; align-items: center;
    z-index: 5;
  }
  .overlay .headline { text-shadow: 0 2px 18px rgba(0,0,0,0.18); }
</style>
</head>
<body>
  <div class="stage">
    <div class="overlay">
      <div class="headline">{{HEADLINE}}</div>
      {{SUBHEAD}}
    </div>
    <div class="device"><img class="device-screen" src="{{SCREENSHOT}}"></div>
  </div>
</body>
</html>
