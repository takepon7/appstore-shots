<!doctype html>
<html lang="ja">
<head><meta charset="utf-8">{{STYLE}}
<style>
  /* No device frame: large rounded screenshot with a short caption above. */
  .stage { justify-content: flex-start; padding-top: 92px; }
  .shot {
    width: var(--device-width, 360px);
    aspect-ratio: 1290 / 2796;
    margin-top: 52px;
    border-radius: 40px;
    object-fit: cover;
    object-position: top center;
    box-shadow: 0 26px 64px rgba(0,0,0,0.28);
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="headline">{{HEADLINE}}</div>
    {{SUBHEAD}}
    <img class="shot" src="{{SCREENSHOT}}">
  </div>
</body>
</html>
